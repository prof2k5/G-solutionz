<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #main {
        background-color: rgba(127, 255, 212, 0.3);
        width: 100%;
        height: 70px;
        padding-top: 10px;
        margin: 0 auto;
      }
      #nav {
        width: 80%;
        display: flex;
        justify-content: center;
        background-color: white;
        margin: 0 auto;
        border-radius: 15px;
      }
      #left-container {
        display: flex;
        justify-content: left;
        align-items: center;
        border-radius: 15px;
        margin-left: 5px;
        margin: 0 auto;
      }
      #right-container {
        display: flex;
        justify-content: right;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin: 0 auto;
      }
      ul {
        list-style: none;
        display: flex;
        gap: 20px;
      }
      button {
        padding: 5px;
        border-radius: 10px;
        background-color: green;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <div id="nav">
        <div id="left-container">
          <div>Trabeac Nation</div>
        </div>
        <div id="right-container">
          <div id="menu-list">
            <ul>
              <li>Home</li>
              <li>About Us</li>
              <li>Investors</li>
              <li>Member Stories</li>
              <li>Join Trabeac</li>
            </ul>
          </div>
          <div><button type="submit">Contact Us</button></div>
        </div>
      </div>
    </div>

</html>
